<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de sesion</title>
    <link rel="stylesheet" href="../css/formStylei.css" type="text/css" />
    

</head>
<div class="contenedorModo">
        <button class="btnModoOscuro" id="btnModoOscuro" onclick="toggleModoOscuro()">Modo oscuro</button>
    </div>
<body>

    <div class="login-container">
        <div class="login-image">
            <img src="../html/imagen1.jpg" alt="Imagen de inicio de sesión">
        </div>
        <div class="login-form-container">

    <h2>Inicio de sesion</h2>
    <form id="miFormulario" action="" enctype="application/x-www-form-urlencoded" novalidate>
        
<label for="correo">Correo electrónico:</label>
<input type="email" id="correo" name="correo" placeholder="Correo electrónico">
<span id="errorCorreo" class="mensaje"></span> <label for="password">Contraseña:</label>
<input type="password" id="password" name="password" placeholder="Ingresa tu contraseña">
<span id="errorPassword" class="mensaje"></span>

        <div class="btnContainer">            
            <button class="submit" type="submit">Ingresar</button>
<button type="button" class="CrearCuenta" onclick="location.href='/registro'">
    Crear Cuenta</button>
            <a href="/recuperar" class="olvido">¿Olvidaste tu contraseña?</a>
            
        </div>
        
    </form>

    <pre id="resultado"></pre>

    <script src="../js/modoOscuro.js"></script>
    <script src="../js/validateFormB.js"></script>


</body>
</html>
