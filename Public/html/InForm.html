<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de sesion</title>
    <link rel="stylesheet" href="../css/formStylei.css" type="text/css" />
    

</head>
<body>

    <div class="login-container">
        <div class="login-image">
            <img src="../html/imagen1.jpg" alt="Imagen de inicio de sesión">
        </div>
        <div class="login-form-container">

    <h2>Inicio de sesion</h2>
    <form id="miFormulario" action="" enctype="application/x-www-form-urlencoded" novalidate>
        
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo"
               placeholder="Correo electrónico" required>
        <span class="mensaje" id="error-correo"></span>
        
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" 
                placeholder="Ingresa tu contraseña" required>
        <span class="mensaje" id="error-password"></span>

        <div class="btnContainer">            
            <button class="submit" type="submit">Ingresar</button>
            <button class="submit" type="submit">Crear Cuenta</button>
            <a href="Conform.html" class="olvido">¿Olvidaste tu contraseña?</a>
            
        </div>
        
    </form>

    <pre id="resultado"></pre>

    <script src="../js/validateFormB.js"></script>


</body>
</html>
