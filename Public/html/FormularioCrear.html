<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar cuenta</title>
    <link rel="stylesheet" href="../css/stylesFormularioCrear.css" type="text/css" />
</head>

    <h2>Registrar cuenta</h2>
 <div class="contenedorModo">
        <button class="btnModoOscuro" id="btnModoOscuro" onclick="toggleModoOscuro()">Modo oscuro</button>
    </div>
    <form id="miFormulario" action="" enctype="multipart/form-data" novalidate> 
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Nombre y Apellido" required>
        <div class="mensaje" id="errorNombre"></div>

        <label for="Telefono">Telefono:</label>
        <input type="text" id="Telefono" name="Telefono" placeholder="(+52) Número celular" required>
        <div class="mensaje" id="errorTelefono"></div>

        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com" required>
        <div class="mensaje" id="errorCorreo"></div>

        <label for="contrasena">Contraseña:</label>
        <input type="text" id="contrasena" name="contrasena" placeholder="Contraseña" required>
        <div class="mensaje" id="errorContrasena"></div>

        <label for="contrasenaConfirmacion">Confirmación de Contraseña:</label>
        <input type="text" id="contrasenaConfirmacion" name="contrasenaConfirmacion" placeholder="Confirma contraseña" required>
        <div class="mensaje" id="errorContrasenaConfirmacion"></div>

        <label for="pregunta">Pregunta de seguridad:</label>
                <select id="pregunta" name="pregunta" class="input-style">
                    <option value="mascota">Nombre de tu mascota</option>
                    <option value="color">¿Cual es tu color favorito?</option>
                    <option value="actividad">¿Hobby favorito?</option>
                </select>
                
        <label for="respuestaRecuperacion">Respuesta de recuperación:</label>
        <input type="text" id="respuestaRecuperacion" name="respuestaRecuperacion" placeholder="Respuesta recuperación" required>
        <div class="mensaje" id="errorRespuestaRecuperacion"></div>

        <div class="btnContainer">
            <button class="registrar" type="submit">Registrar</button>
            <button class="olvido" type="button" onclick="window.location.href='/'">Ya tengo cuenta</button> 
        </div>
    </form>

    <div id="resultado"></div>
    <div class="success" id="mensajeExito"></div>

    
    <div id="tarjetaExito" style="display:none;">
        <div class="tarjeta">
            <h2>¡Registro exitoso!</h2>
            <p>Tu cuenta ha sido creada correctamente.</p>
            <button class="registrar" onclick="window.location.href='/'">Iniciar sesión</button>
        </div>
    </div>

    <div id="tarjetaError" style="display:none;">
        <div class="tarjeta">
            <h2>¡Usuario ya existe!</h2>
            <p>El correo ingresado ya está registrado.</p>
            <button class="registrar" onclick="cerrarTarjetaError()">Intentar con otro correo</button>
        </div>
    </div>

    <script src="../js/modoOscuro.js"></script>
    <script src="../js/validateFormB.js"></script>
    
</body>
</html>
