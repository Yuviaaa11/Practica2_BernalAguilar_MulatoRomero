<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio</title>
    <link rel="stylesheet" href="../css/stylesInicioSesion.css" type="text/css" />
</head>
<body>
<form id="loginForm" novalidate> <!--modificar esto para las vistas, agregamos: action=-->
    <div class="contenedorModo">
        <button class="btnModoOscuro" id="btnModoOscuro" onclick="toggleModoOscuro()">Modo oscuro</button>
    </div>

    <div class="sesion-container">
        <div class="bienvenida">
            <img src="../html/imagen2.webp" alt="Avatar" class="avatarUsuario">
            <h2>¡Bienvenido!</h2>
            <p>Has iniciado sesión correctamente.</p>
            <button class="submit" onclick="cerrarSesion()">Salir de la sesión</button>
        </div>
    </div>

    <script src="../js/modoOscuro.js"></script>
    <script>
        function cerrarSesion() {
            window.location.href = "/";
        }
    </script>

</body>
</html>
