<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="../css/formStylec.css" type="text/css" />
</head>
<body>
    <div class="recovery-container">
        <div class="form-section">
            <h2>Recuperar Cuenta</h2>
            <p style="text-align: center; color: #606770; margin-bottom: 20px;">
                Responde a tu pregunta de seguridad para restablecer tu contraseña.
            </p>

            <form id="formRecuperar" novalidate>
                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="Tu correo registrado" required>
                <span class="mensaje" id="error-correo"></span>

                <label for="pregunta">Pregunta de seguridad:</label>
                <select id="pregunta" name="pregunta" class="input-style">
                    <option value="mascota">¿Nombre de tu primera mascota?</option>
                </select>

                <label for="respuesta">Palabra secreta (Respuesta):</label>
                <input type="text" id="respuesta" name="respuesta" placeholder="Escribe tu palabra secreta" required>
                <span class="mensaje" id="error-respuesta"></span>

                <div class="btnContainer">
                    <button class="submit" type="submit">Verificar Identidad</button>
                    <a href="InForm.html" class="olvido">Regresar al inicio de sesión</a>
                </div>
            </form>
            <pre id="resultado"></pre>
        </div>
    </div>
    <script src="../js/validateRecovery.js"></script>
</body>
</html>
